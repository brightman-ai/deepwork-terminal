<!DOCTYPE html>

    <!-- interactive-widget=resizes-content: when the soft keyboard opens, resize the LAYOUT
         viewport (not just the visual one) so the app shell shrinks to the area above the
         keyboard instead of iOS scroll-shifting the fixed shell and exposing a gap. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">

    <!-- PWA: installable shell + Web Push. SW + icons are served at root scope by
         the Go SPA handler (internal/spa/embed.go), so manifest scope '/' is valid. -->
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#0d0d0f">

    <!-- iOS Safari: no manifest install/Push prompt — these enable "Add to Home

    <!-- App shell base color (terminal-scoped). The shared @ce stylesheet currently
         renders with the LIGHT :root tokens (.dark is not applied app-wide), so the
         body background is a light gray. In an iOS standalone PWA the visible viewport
         (visualViewport.height → --dw-app-viewport-height) excludes the bottom
         home-indicator inset, so #app ends ABOVE the physical screen bottom and the
         body background shows in that inset band — a gray strip below the dark bottom
         toolbar. Painting the shell root in the canonical dark app color (#0d0d0f =
         the .dark --background token and the manifest theme-color above) makes that
         band seamless dark. No-op in a Safari tab: there the viewport spans to the bar
         and the body is fully covered, so the body color is never visible. This is the
         terminal's own index.html — it does NOT touch the shared @ce stylesheet. -->
    <style>
      html, body { background-color: #0d0d0f; }
    </style>
